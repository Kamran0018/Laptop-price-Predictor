[theme]
base                     = "light"
primaryColor             = "#6366f1"
backgroundColor          = "#f0f4ff"
secondaryBackgroundColor = "#ffffff"
textColor                = "#1e1b4b"
font                     = "sans serif"

[server]
headless             = true
enableCORS           = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
